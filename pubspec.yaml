name: datadash
description: "DataDash - dashboards mobile com importacao e exportacao local."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.1
  google_fonts: ^8.1.0
  provider: ^6.1.5
  file_picker: ^10.3.2
  csv: ^6.0.0
  excel: ^4.0.6
  fl_chart: ^1.1.1
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^11.1.0
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
